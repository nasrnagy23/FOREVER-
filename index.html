<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MAYAR & NASR ♥️</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="login">

    <img class="cover" src="cover.jpg">

    <h1>MAYAR & NASR ♥️</h1>
<div class="counter">
    <h2>معًا منذ ❤️</h2>
    <p id="timer"></p>
</div>
    <input id="password" type="password" placeholder="Password">

    <br>

    <button onclick="checkPassword()">Enter</button>

</div>


<div id="content" style="display:none;">

    <h1>MAYAR & NASR ♥️</h1>

    <!-- هنا ضفنا ملف الأغنية عشان يشتغل جوة الموقع -->
    <audio src="music.mp3" autoplay loop></audio>

    <div class="memory">
        <img src="image1.jpg">
        <h3>التاريخ هنا 📅</h3>
        <p>اكتب الذكرى هنا ❤️</p>
    </div>

    <div class="memory">
        <img src="image2.jpg">
        <h3>التاريخ هنا 📅</h3>
        <p>اكتب الذكرى هنا ❤️</p>
        
        <!-- هنا ضفنا كود الفيديو تحت الصورة التانية مع التنسيق الفخم بتاعه -->
        <video src="video.mp4" controls width="100%" style="border-radius: 15px; margin-top: 15px; box-shadow: 0 0 20px #ff0033;"></video>
    </div>

</div>

<script>
  let startDate = new Date("2026-03-08T00:00:00");

  function updateTimer() {
      let now = new Date();
      let diff = now - startDate;
      
      let days = Math.floor(diff / (1000 * 60 * 60 * 24));
      let hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
      let minutes = Math.floor((diff / (1000 * 60)) % 60);
      let seconds = Math.floor((diff / 1000) % 60);
      
      document.getElementById("timer").innerHTML = days + " يوم ❤️ " + hours + " ساعة " + minutes + " دقيقة " + seconds + " ثانية ";
  }
  
  setInterval(updateTimer, 1000);
  updateTimer();

  function checkPassword(){
      let pass = document.getElementById("password").value;
      if(pass === "102234"){
          document.getElementById("login").style.display="none";
          document.getElementById("content").style.display="block";
      } else {
          alert("Wrong Password");
      }
  }
</script>

</body>
</html>
